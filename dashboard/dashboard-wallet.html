<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToxiBot — Live Trade Feed</title>
    <style>
        :root {
            --bg-dark: #0a0a1a;
            --bg-card: rgba(15, 15, 35, 0.85);
            --border-glow: rgba(0, 255, 170, 0.15);
            --accent: #00ffaa;
            --accent-dim: #00cc88;
            --danger: #ff4466;
            --warning: #ffaa00;
            --text: #e0e0e0;
            --text-dim: #888;
            --profit: #00ffaa;
            --loss: #ff4466;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(0, 255, 170, 0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(0, 100, 255, 0.03) 0%, transparent 50%);
        }

        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 2rem;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border-glow);
            backdrop-filter: blur(10px);
        }

        nav .logo { font-size: 1.4rem; font-weight: 700; color: var(--accent); letter-spacing: 1px; }
        nav .nav-links { display: flex; gap: 1.5rem; }
        nav .nav-links a {
            color: var(--text-dim); text-decoration: none; font-size: 0.9rem;
            padding: 0.4rem 0.8rem; border-radius: 6px; transition: all 0.2s;
        }
        nav .nav-links a:hover, nav .nav-links a.active { color: var(--accent); background: rgba(0, 255, 170, 0.1); }

        .layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.2rem;
            padding: 1.5rem 2rem;
            max-width: 1600px;
            margin: 0 auto;
        }

        .full-width { grid-column: 1 / -1; }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-glow);
            border-radius: 12px;
            padding: 1.2rem 1.5rem;
            backdrop-filter: blur(10px);
        }

        .card:hover { border-color: rgba(0, 255, 170, 0.3); }
        .card h3 {
            font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px;
            color: var(--text-dim); margin-bottom: 0.8rem;
        }

        .pnl-positive { color: var(--profit); }
        .pnl-negative { color: var(--loss); }

        /* Signal feed */
        .signal-feed {
            max-height: 500px;
            overflow-y: auto;
        }

        .signal-item {
            display: grid;
            grid-template-columns: 80px 1fr auto;
            gap: 0.5rem;
            align-items: center;
            padding: 0.6rem 0.4rem;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            font-size: 0.85rem;
            transition: background 0.2s;
        }

        .signal-item:hover { background: rgba(0, 255, 170, 0.03); }

        .signal-source {
            font-size: 0.75rem;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            text-align: center;
            font-weight: 600;
        }

        .src-pumpportal { background: rgba(255, 100, 50, 0.2); color: #ff8844; }
        .src-geckoterminal { background: rgba(100, 200, 50, 0.2); color: #88cc44; }
        .src-dexpaprika { background: rgba(50, 150, 255, 0.2); color: #44aaff; }

        .signal-mint {
            font-family: monospace;
            color: var(--accent);
            font-size: 0.8rem;
        }

        .signal-time { color: var(--text-dim); font-size: 0.75rem; }

        /* Active positions */
        .position-card {
            background: rgba(0, 255, 170, 0.05);
            border: 1px solid var(--border-glow);
            border-radius: 8px;
            padding: 0.8rem 1rem;
            margin-bottom: 0.5rem;
        }

        .position-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.3rem;
        }

        .position-personality {
            font-weight: 600;
            font-size: 0.85rem;
        }

        .position-details {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.5rem;
            font-size: 0.8rem;
        }

        .position-detail-label { color: var(--text-dim); }

        /* Trade log */
        .trade-log {
            max-height: 600px;
            overflow-y: auto;
        }

        .trade-row {
            display: grid;
            grid-template-columns: 60px 80px 1fr 80px 80px 80px;
            gap: 0.3rem;
            align-items: center;
            padding: 0.5rem 0.3rem;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            font-size: 0.8rem;
        }

        .trade-row.header {
            color: var(--text-dim);
            font-weight: 600;
            border-bottom: 1px solid var(--border-glow);
            position: sticky;
            top: 0;
            background: var(--bg-card);
        }

        .badge {
            display: inline-block;
            padding: 0.15rem 0.4rem;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .badge-buy { background: rgba(0, 255, 170, 0.15); color: var(--accent); }
        .badge-sell { background: rgba(255, 68, 102, 0.15); color: var(--danger); }
        .badge-sd { background: rgba(255, 200, 0, 0.15); color: #ffcc00; }
        .badge-an { background: rgba(0, 150, 255, 0.15); color: #44aaff; }
        .badge-wt { background: rgba(150, 50, 255, 0.15); color: #bb88ff; }

        /* Whale activity panel */
        .whale-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            font-size: 0.85rem;
        }

        .whale-address {
            font-family: monospace;
            color: var(--accent-dim);
            font-size: 0.8rem;
        }

        @media (max-width: 768px) {
            nav { flex-direction: column; gap: 0.5rem; }
            .layout { grid-template-columns: 1fr; padding: 1rem; }
            .trade-row { grid-template-columns: 50px 60px 1fr 60px 60px; }
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo">ToxiBot</div>
        <div class="nav-links">
            <a href="/dashboard/dashboard.html">Overview</a>
            <a href="/dashboard/dashboard-analytics.html">Analytics</a>
            <a href="/dashboard/dashboard-wallet.html" class="active">Trade Feed</a>
            <a href="/logout" style="color:var(--text-dim);opacity:0.6;">Logout</a>
        </div>
    </nav>

    <div class="layout">
        <!-- Incoming Signal Feed -->
        <div class="card">
            <h3>Incoming Signals (Pre-ML Gate)</h3>
            <div class="signal-feed" id="signalFeed">
                <div style="color:var(--text-dim); padding:1rem; text-align:center;">
                    Waiting for signals...
                </div>
            </div>
        </div>

        <!-- Active Positions -->
        <div class="card">
            <h3>Active Positions</h3>
            <div id="activePositions">
                <div style="color:var(--text-dim); padding:1rem; text-align:center;">
                    No active positions
                </div>
            </div>
        </div>

        <!-- Recent Closed Trades -->
        <div class="card full-width">
            <h3>Recent Closed Trades (Last 50)</h3>
            <div class="trade-log" id="tradeLog">
                <div class="trade-row header">
                    <div>Action</div>
                    <div>Bot</div>
                    <div>Token</div>
                    <div>Size</div>
                    <div>P/L</div>
                    <div>Time</div>
                </div>
            </div>
        </div>

        <!-- Whale Wallet Activity -->
        <div class="card full-width">
            <h3>Whale Wallet Activity</h3>
            <div id="whaleActivity">
                <div style="color:var(--text-dim); padding:1rem; text-align:center;">
                    No whale activity detected yet
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;
        let ws = null;
        const MAX_SIGNALS = 100;
        let signalBuffer = [];

        async function fetchJSON(path) {
            try {
                const resp = await fetch(API_BASE + path);
                return await resp.json();
            } catch (e) { return null; }
        }

        function shortMint(mint) {
            if (!mint || mint.length < 12) return mint || '--';
            return mint.slice(0, 6) + '...' + mint.slice(-4);
        }

        function timeAgo(ts) {
            if (!ts) return '--';
            const diff = (Date.now() / 1000) - ts;
            if (diff < 60) return Math.round(diff) + 's ago';
            if (diff < 3600) return Math.round(diff / 60) + 'm ago';
            return Math.round(diff / 3600) + 'h ago';
        }

        function personalityBadge(p) {
            const map = {
                speed_demon: ['SD', 'badge-sd'],
                analyst: ['AN', 'badge-an'],
                whale_tracker: ['WT', 'badge-wt'],
            };
            const [label, cls] = map[p] || [p, ''];
            return '<span class="badge ' + cls + '">' + label + '</span>';
        }

        function sourceClass(src) {
            const map = { pumpportal: 'src-pumpportal', geckoterminal: 'src-geckoterminal', dexpaprika: 'src-dexpaprika' };
            return map[src] || '';
        }

        // --- Signal Feed ---
        function addSignal(signal) {
            signalBuffer.unshift(signal);
            if (signalBuffer.length > MAX_SIGNALS) signalBuffer.pop();
            renderSignals();
        }

        function renderSignals() {
            const el = document.getElementById('signalFeed');
            if (signalBuffer.length === 0) return;
            el.innerHTML = signalBuffer.map(s =>
                '<div class="signal-item">' +
                '<div class="signal-source ' + sourceClass(s.source) + '">' + (s.source || '--') + '</div>' +
                '<div><span class="signal-mint">' + shortMint(s.mint) + '</span> <span style="color:var(--text-dim);font-size:0.75rem;">' + (s.signal_type || '') + '</span></div>' +
                '<div class="signal-time">' + (s.timestamp ? new Date(s.timestamp).toLocaleTimeString() : '--') + '</div>' +
                '</div>'
            ).join('');
        }

        // --- Active Positions ---
        function renderPositions(trades) {
            const el = document.getElementById('activePositions');
            if (!trades || trades.length === 0) {
                el.innerHTML = '<div style="color:var(--text-dim);padding:1rem;text-align:center;">No active positions</div>';
                return;
            }
            el.innerHTML = trades.map(t =>
                '<div class="position-card">' +
                '<div class="position-header">' +
                '<div class="position-personality">' + personalityBadge(t.personality) + ' ' + shortMint(t.mint) + '</div>' +
                '<div style="font-size:0.8rem;color:var(--text-dim);">' + timeAgo(t.created_at) + '</div>' +
                '</div>' +
                '<div class="position-details">' +
                '<div><span class="position-detail-label">Size:</span> ' + (t.amount_sol || 0).toFixed(4) + ' SOL</div>' +
                '<div><span class="position-detail-label">Entry:</span> $' + (t.entry_price || 0).toFixed(8) + '</div>' +
                '<div><span class="position-detail-label">ML:</span> ' + (t.ml_score || 0).toFixed(1) + '</div>' +
                '</div></div>'
            ).join('');
        }

        // --- Trade Log ---
        function renderTrades(trades) {
            const log = document.getElementById('tradeLog');
            const header = '<div class="trade-row header"><div>Action</div><div>Bot</div><div>Token</div><div>Size</div><div>P/L</div><div>Time</div></div>';

            if (!trades || trades.length === 0) {
                log.innerHTML = header + '<div style="color:var(--text-dim);padding:1rem;text-align:center;">No trades yet</div>';
                return;
            }

            const rows = trades.filter(t => t.closed_at).map(t => {
                const pnl = t.pnl_sol || 0;
                const pnlClass = pnl >= 0 ? 'pnl-positive' : 'pnl-negative';
                return '<div class="trade-row">' +
                    '<div><span class="badge badge-' + (t.action || 'buy') + '">' + (t.action || '--').toUpperCase() + '</span></div>' +
                    '<div>' + personalityBadge(t.personality) + '</div>' +
                    '<div class="signal-mint">' + shortMint(t.mint) + '</div>' +
                    '<div>' + (t.amount_sol || 0).toFixed(3) + '</div>' +
                    '<div class="' + pnlClass + '">' + (pnl >= 0 ? '+' : '') + pnl.toFixed(4) + '</div>' +
                    '<div class="signal-time">' + timeAgo(t.closed_at) + '</div>' +
                    '</div>';
            }).join('');

            log.innerHTML = header + (rows || '<div style="color:var(--text-dim);padding:1rem;text-align:center;">No closed trades yet</div>');
        }

        // --- WebSocket ---
        function connectWS() {
            const wsUrl = (location.protocol === 'https:' ? 'wss:' : 'ws:') + '//' + location.host + '/ws';
            ws = new WebSocket(wsUrl);

            ws.onmessage = function(event) {
                try {
                    const data = JSON.parse(event.data);
                    // Handle incoming signals for the live feed
                    if (data._type === 'periodic_update' && data.status && data.status.positions) {
                        // Could update positions in real-time
                    }
                } catch (e) {}
            };

            ws.onclose = function() { setTimeout(connectWS, 3000); };
        }

        // --- Load data ---
        async function loadAll() {
            const [active, trades] = await Promise.all([
                fetchJSON('/api/trades/active'),
                fetchJSON('/api/trades?limit=50'),
            ]);

            renderPositions(active);
            renderTrades(trades);
        }

        loadAll();
        connectWS();
        setInterval(loadAll, 10000);
    </script>
</body>
</html>
